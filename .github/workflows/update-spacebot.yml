name: Update Spacebot

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake lock and frontend hash
        run: ./scripts/update-spacebot.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- flake.lock nix/default.nix; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit-message: "update spacebot upstream"
          branch: main
          add-paths: |
            flake.lock
            nix/default.nix
